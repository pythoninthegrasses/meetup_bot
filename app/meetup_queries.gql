# techlahoma SELF_ID (graphql playground)
query { self { id name } }

# recon
query {
	self {
		id
		name
		username
		memberUrl
	}
}

# first-party events (techlahoma member events)
query {
	self {
		id
		name
		username
		memberUrl
		memberEvents(first: 10) {
			totalCount
			pageInfo {
				endCursor
			}
			edges {
				node {
					id
					title
					description
					dateTime
					eventUrl
					group {
						id
						name
						urlname
						link
						city
					}
				}
			}
		}
	}
}

# events by query var
# {"eventId":"285533748"}
query($eventId: ID) {
	event(id: $eventId) {
		title
		description
		dateTime
		eventUrl
		group {
			id
			name
			proNetwork {
				id
			}
		}
	}
}

# search all events by group proNetwork id
# { "group": { "proNetwork": { "id": "364335959210266624" } } }
{ "id": "364335959210266624" }
query($id: ID!) {
	proNetwork(id: $id) {
		eventsSearch(filter: { status: UPCOMING }, input: { first: 25 }) {
			count
			pageInfo {
				endCursor
			}
			edges {
				node {
					id
					title
					description
					dateTime
					eventUrl
				}
			}
		}
	}
}

# group by urlname (third-party / unaffiliated groups)
# {"urlname":"pythonistas"}
query($urlname: String!) {
	groupByUrlname(urlname: $urlname) {
		id
		description
		name
		urlname
		city
		link
		events(first: 3) {
			totalCount
			pageInfo {
				endCursor
			}
			edges {
				node {
					id
					title
					description
					dateTime
					eventUrl
					group {
						id
						name
						urlname
						link
						city
					}
				}
			}
		}
	}
}

# group by ID (validated: IDs match between groupByUrlname and groupSearch)
# {"id":"35460866"}
query($id: ID!) {
	group(id: $id) {
		id
		description
		name
		urlname
		city
		link
		events(first: 3) {
			totalCount
			pageInfo {
				endCursor
			}
			edges {
				node {
					id
					title
					description
					dateTime
					eventUrl
					group {
						id
						name
						urlname
						link
						city
					}
				}
			}
		}
	}
}

# keyword search for programming groups in OKC area
# topicCategoryId 546 = Technology (from topicCategories query)
# IDs returned here match groupByUrlname IDs (verified for pythonistas, okcwebdevs, okccoffeeandcode)
# node(id:) does NOT exist in Meetup's schema; use group(id:) or groupByUrlname(urlname:) instead
{"query": "programming", "topicCategoryId": "546"}
query ($query: String!, $topicCategoryId: ID) {
	groupSearch(
		filter: {query: $query, lat: 35.467560, lon: -97.516426, topicCategoryId: $topicCategoryId}
		first: 50
	) {
		totalCount
		pageInfo {
			endCursor
			hasNextPage
		}
		edges {
			node {
				id
				name
				urlname
				city
				proNetwork {
					id
				}
			}
		}
	}
}
