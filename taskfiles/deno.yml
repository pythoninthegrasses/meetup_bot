version: "3.0"

set: ['e', 'u', 'pipefail']
shopt: ['globstar']

tasks:
  check-deps:
    desc: "Check if deno is installed"
    cmds:
      - |
        if ! command -v deno &> /dev/null; then
          echo "deno not found. Install from https://deno.com"
          exit 1
        fi
        echo "deno version: $(deno --version | head -1)"
    silent: true

  contributors:add:
    desc: "Add a contributor"
    cmds:
      - deno run -A npm:all-contributors-cli add {{.CLI_ARGS}}

  contributors:generate:
    desc: "Generate contributors list"
    cmds:
      - deno run -A npm:all-contributors-cli generate

  cache-clean:
    desc: "Clean deno cache"
    cmds:
      - deno cache --reload
    silent: true
