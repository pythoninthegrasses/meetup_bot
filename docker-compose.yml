services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-meetup}
      POSTGRES_PASSWORD: ${DB_PASS:-meetup}
      POSTGRES_DB: ${DB_NAME:-meetup_bot}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-meetup}"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - default

  meetup-bot:
    # container_name: meetup-bot
    image: ghcr.io/pythoninthegrass/meetup-bot
    build:
      context: .
      dockerfile: Dockerfile.web
    platform: ${PLATFORM:-linux/amd64}  # linux/amd64, linux/arm64/v8
    tty: false                          # false for `entrypoint` in Dockerfile
    stdin_open: false                   # false for `entrypoint` in Dockerfile
    env_file:
      - .env
    volumes:
      - ./app:/app
    ports:
      - ${PORT:-3100}:3100
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

volumes:
  pgdata:

networks:
  default:
    driver: bridge
