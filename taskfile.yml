# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3.0"

set: ['e', 'u', 'pipefail']
shopt: ['globstar']

dotenv: ['./.env']

env:
  VENV_DIR: "{{.ROOT_DIR}}/.venv"
  PATH: "{{.VENV_DIR}}/bin:{{.PATH}}"

vars:

includes:
  deno:
    taskfile: ./taskfiles/deno.yml
  docker:
    taskfile: ./taskfiles/docker.yml
  pytest:
    taskfile: ./taskfiles/pytest.yml
  uv:
    taskfile: ./taskfiles/uv.yml

tasks:
  default:
    desc: "Default task"
    cmds:
      - task --list

  # TODO: update this
  install:
    desc: "Install project dependencies"
    cmds:
      - |
        {{.INSTALL}} {{.CLI_ARGS}}

  pre-commit:
    desc: "Run pre-commit hooks"
    cmds:
      - prek run

  lint:
    desc: "Run linters"
    cmds:
      - ruff check --fix --respect-gitignore

  format:
    desc: "Run formatters"
    cmds:
      - ruff format --respect-gitignore

  test:
    desc: "Run all tests"
    cmds:
      - task: pytest:test

  test:unit:
    desc: "Run unit tests"
    cmds:
      - task: pytest:test:unit

  test:integration:
    desc: "Run integration tests (starts/stops server)"
    cmds:
      - task: pytest:test:integration

  test:e2e:
    desc: "Run e2e tests (starts/stops server)"
    cmds:
      - task: pytest:test:e2e

  test:property:
    desc: "Run property-based tests (Hypothesis)"
    cmds:
      - task: pytest:test:property

  test:cov:
    desc: "Run tests with coverage"
    cmds:
      - task: pytest:test:cov

  pyclean:
    desc: "Remove .pyc and __pycache__"
    cmds:
      - |
        args=(
          .
          --debris
          --verbose
          -i .devbox
        )
        case "{{.CLI_ARGS}}" in
          dry-run)
            pyclean "${args[@]}" --dry-run
            ;;
          *)
            pyclean "${args[@]}"
            ;;
        esac

  checkbash:
    desc: "Check bash scripts"
    cmds:
      - checkbashism -x {{.ROOT_DIR}}/app/*.sh

  repomix:
    desc: "Create llm snapshot of repo"
    preconditions:
      - sh: command -v repomix 2>/dev/null
        msg: "repomix is not installed. Install with: deno install -g npm:repomix"
    cmds:
      - |
        repomix \
          --style markdown \
          --compress \
          --remove-comments \
          --remove-empty-lines \
          --truncate-base64
    sources:
      - "**/*.py"
      - "**/*.toml"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.md"
      - "**/*.json"
      - ".repomix*"
    generates:
      - repomix-output.md
